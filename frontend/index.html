<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimodal Search Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="glow-text">Semantic Search Engine</h1>
            <p class="subtitle">Search across Image, Video, and Audio modalities simultaneously.</p>
        </header>

        <section class="search-section glass-panel">
            <div class="search-tabs">
                <button class="tab-btn active" data-search-type="text">Text Query</button>
                <button class="tab-btn" data-search-type="image">Image Upload</button>
                <button class="tab-btn" data-search-type="video">Video Upload</button>
                <button class="tab-btn" data-search-type="audio">Audio Upload</button>
            </div>
            
            <div id="text-search-container" class="search-input-container active">
                <input type="text" id="text-query" placeholder="Type what you're looking for..." autocomplete="off">
                <button id="search-text-btn" class="primary-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Search
                </button>
            </div>
            
            <div id="image-search-container" class="search-input-container" style="display: none;">
                <div class="dropzone" id="image-dropzone">
                    <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    <p>Drag & Drop an image here, or <span class="highlight">browse</span></p>
                    <input type="file" id="image-input" accept="image/*" class="hidden">
                    <img id="image-preview" class="hidden" alt="Preview"/>
                </div>
                <button id="search-image-btn" class="primary-btn" disabled>Search with Image</button>
            </div>

            <div id="video-search-container" class="search-input-container" style="display: none;">
                <div class="dropzone" id="video-dropzone">
                    <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="2" fill="none"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                    <p>Drag & Drop a video here, or <span class="highlight">browse</span></p>
                    <input type="file" id="video-input" accept="video/*" class="hidden">
                    <div id="video-preview-placeholder" class="preview-placeholder hidden">Video selected</div>
                    <video id="video-preview" class="hidden" autoplay loop muted playsinline></video>
                </div>
                <button id="search-video-btn" class="primary-btn" disabled>Search with Video</button>
            </div>

            <div id="audio-search-container" class="search-input-container" style="display: none;">
                <div class="dropzone" id="audio-dropzone">
                    <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="2" fill="none"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                    <p>Drag & Drop audio here, or <span class="highlight">browse</span></p>
                    <input type="file" id="audio-input" accept="audio/*" class="hidden">
                    <div id="audio-preview-placeholder" class="preview-placeholder hidden">Audio selected</div>
                </div>
                <button id="search-audio-btn" class="primary-btn" disabled>Search with Audio</button>
            </div>
        </section>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Computing vectors & searching indices...</p>
        </div>

        <section id="results-section" class="results-section hidden">
            <nav class="results-nav glass-panel">
                <button class="r-tab-btn" data-scroll-to="image-results">Images <span id="img-count" class="badge">0</span></button>
                <button class="r-tab-btn" data-scroll-to="video-results">Videos <span id="vid-count" class="badge">0</span></button>
                <button class="r-tab-btn" data-scroll-to="audio-results">Audio <span id="aud-count" class="badge">0</span></button>
            </nav>
            
            <div class="results-content">
                <div class="modality-section" id="image-results-section">
                    <h2 class="section-title">Images</h2>
                    <div id="image-results" class="grid-layout"></div>
                </div>

                <div class="modality-section" id="video-results-section">
                    <h2 class="section-title">Videos</h2>
                    <div id="video-results" class="list-layout"></div>
                </div>

                <div class="modality-section" id="audio-results-section">
                    <h2 class="section-title">Audio</h2>
                    <div id="audio-results" class="list-layout"></div>
                </div>
            </div>
        </section>
        
    </div>
    <script src="app.js"></script>
</body>
</html>
